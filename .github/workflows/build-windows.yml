name: Build Windows Installer

on:
  workflow_dispatch:  # Manual trigger from GitHub UI
  push:
    tags:
      - 'v*'  # Also triggers on version tags

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Sync bundled-template from template
        run: |
          if (Test-Path "template") {
            Copy-Item -Path "template\*" -Destination "bundled-template\" -Recurse -Force
            Write-Output "Synced template -> bundled-template"
          }
        shell: pwsh

      - name: Download Node runtime for Windows x64
        run: |
          $nodeVersion = "v22.14.0"
          $url = "https://nodejs.org/dist/$nodeVersion/node-$nodeVersion-win-x64.zip"
          $outZip = "node-win-x64.zip"
          $outDir = "node-runtime/win32-x64"

          New-Item -ItemType Directory -Force -Path $outDir | Out-Null
          Write-Output "Downloading Node $nodeVersion for Windows x64..."
          Invoke-WebRequest -Uri $url -OutFile $outZip
          Expand-Archive -Path $outZip -DestinationPath "node-temp" -Force

          # Copy just the node.exe binary
          $extractedDir = Get-ChildItem "node-temp" | Select-Object -First 1
          Copy-Item "$($extractedDir.FullName)\node.exe" "$outDir\node.exe"

          # Clean up
          Remove-Item $outZip -Force
          Remove-Item "node-temp" -Recurse -Force
          Write-Output "Node runtime ready at $outDir/node.exe"
          Get-Item "$outDir\node.exe" | Select-Object Length
        shell: pwsh

      - name: Build Windows installer
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            dist/*.exe
            dist/*.exe.blockmap
          retention-days: 30

      - name: Upload to Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
